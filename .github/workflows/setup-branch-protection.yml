name: Setup Branch Protection

on:
  workflow_dispatch:

permissions:
  contents: read
  administration: write

jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - name: Setup branch protection for main
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: 'bigknoxy',
              repo: 'TurboHop',
              branch: 'main',
              required_pull_request_reviews: {
                required_approving_review_count: 1,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false
              },
              enforce_admins: false,
              required_status_checks: null,
              restrictions: null
            });
            console.log('Branch protection configured:');
            console.log('- PRs required to merge into main');
            console.log('- 1 approval required');
            console.log('- Stale reviews dismissed on new commits');
            console.log('- Admin bypass enabled');
