name: Deploy to Firebase (Production)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy to GitHub Pages (Staging)"]
    types:
      - completed
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  deploy-firebase:
    runs-on: ubuntu-latest
    environment:
      name: firebase-production
      url: https://turbohop-game.web.app
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build for Firebase
        run: bun run build:firebase

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS" > /tmp/service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/service-account.json
          firebase deploy --only hosting --project turbohop-game --non-interactive

  auto-version:
    runs-on: ubuntu-latest
    needs: deploy-firebase
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "^(BREAKING CHANGE|feat!|fix!|refactor!)"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat"; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^(fix|perf|refactor)"; then
            PATCH=$((PATCH + 1))
            BUMP="patch"
          else
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Version bump: $LATEST_TAG -> $NEW_VERSION ($BUMP)"

      - name: Update package.json version
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}
          VERSION_NUM=${VERSION#v}
          bun -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            pkg.version = '${VERSION_NUM}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate changelog
        id: changelog
        run: |
          LATEST_TAG=${{ steps.bump.outputs.latest_tag }}
          NEW_VERSION=${{ steps.bump.outputs.new_version }}
          DATE=$(date +%Y-%m-%d)

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --reverse)
          else
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
          fi

          ENTRY="## [${NEW_VERSION}] - ${DATE}

          ${COMMITS}
          "

          echo "$ENTRY" > /tmp/release_notes.md

          if [ -f CHANGELOG.md ]; then
            {
              head -2 CHANGELOG.md
              echo ""
              echo "$ENTRY"
              tail -n +3 CHANGELOG.md
            } > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "$ENTRY"
            } > CHANGELOG.md
          fi

      - name: Update README version badge
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}
          if [ -f README.md ]; then
            sed -i "s/version-v[0-9]*\.[0-9]*\.[0-9]*/version-${VERSION}/g" README.md
          fi

      - name: Commit version bump
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md README.md
          git diff --cached --quiet || git commit -m "chore: release ${VERSION} [skip ci]"
          git push

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.bump.outputs.new_version }}
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/release_notes.md
