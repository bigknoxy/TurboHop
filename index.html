<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TurboHop</title>

  <!-- PWA -->
  <link rel="manifest" href="%BASE_URL%manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TurboHop" />
  <link rel="apple-touch-icon" href="%BASE_URL%icons/icon-192.svg" />

  <!-- Font is self-hosted via @fontsource/press-start-2p, imported in
       main.ts and bundled by Vite. No Google Fonts CDN dependency. -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      /* Theme-colored so any <1px rounding gap blends into the game palette
         instead of flashing black bars on the edges. */
      background: #1a1a2e;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    /* The Phaser parent must be a plain block that exactly matches the
       visual viewport. Do NOT add flexbox centering or padding here —
       Phaser's `autoCenter: CENTER_BOTH` handles canvas positioning by
       setting `margin-top` on the <canvas> directly. Any flex/grid
       centering on this container would stack with Phaser's margin and
       produce asymmetric letterbox bars (top gap ≠ bottom gap), which is
       exactly the bug the post-merge Pixel 9a screenshot revealed. */
    #game {
      position: fixed;
      inset: 0;
      /* Dynamic viewport height so collapsing/expanding mobile browser
         chrome (URL bar, nav gestures) doesn't shrink the canvas. The
         static 100vh fallback catches browsers that don't support dvh. */
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #1a1a2e;
    }
    #game canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* Defensive: cap the canvas so it can never spill past the parent
         even if a browser quirk adds a scrollbar or inset we didn't
         anticipate. Phaser still controls the actual pixel dimensions. */
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
